<svg width="450" height="380" viewBox="0 0 450 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2335"/>
      <stop offset="100%" stop-color="#181926"/>
    </linearGradient>
    <linearGradient id="laptopBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#20222f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="450" height="380" fill="url(#bgGlow)" rx="18"/>

  <!-- floating particles -->
  <circle cx="60" cy="60" r="3" fill="#7AA2F7" opacity="0.7">
    <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="90" r="4" fill="#BB9AF7" opacity="0.6">
    <animate attributeName="cy" values="90;65;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="3" fill="#9ECE6A" opacity="0.6">
    <animate attributeName="cy" values="300;280;300" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="310" r="3.5" fill="#7DCFFF" opacity="0.6">
    <animate attributeName="cy" values="310;290;310" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- </> symbol floating top -->
  <text x="225" y="55" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#7AA2F7" text-anchor="middle" opacity="0.85">
    &lt;/&gt;
    <animate attributeName="opacity" values="0.85;0.4;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Laptop screen -->
  <g filter="url(#glow)">
    <rect x="95" y="90" width="260" height="170" rx="10" fill="url(#screenGrad)" stroke="#3b3f58" stroke-width="2"/>
  </g>

  <!-- window dots -->
  <circle cx="115" cy="108" r="4" fill="#F7768E"/>
  <circle cx="130" cy="108" r="4" fill="#E0AF68"/>
  <circle cx="145" cy="108" r="4" fill="#9ECE6A"/>

  <!-- code lines (typing animation via width) -->
  <g font-family="Fira Code, monospace" font-size="11" fill="#7AA2F7">
    <text x="112" y="132" fill="#BB9AF7">const</text>
    <text x="148" y="132" fill="#C0CAF5">build</text>
    <text x="185" y="132" fill="#7DCFFF">=</text>
    <text x="196" y="132" fill="#9ECE6A">() =&gt; {</text>

    <rect x="120" y="140" width="0" height="10" fill="#1f2335">
      <animate attributeName="width" values="0;140;140;0" keyTimes="0;0.3;0.85;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="120" y="150" fill="#7AA2F7" opacity="0">
      ship(idea);
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.32;0.85;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <text x="120" y="168" fill="#7AA2F7" opacity="0">
      learn(daily);
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <text x="120" y="186" fill="#7AA2F7" opacity="0">
      solve(bugs);
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.5;0.6;0.7;0.85;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <text x="112" y="204" fill="#9ECE6A" opacity="0">
      &#125;;
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.7;0.75;0.8;0.85;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <!-- blinking cursor -->
    <rect x="176" y="195" width="7" height="12" fill="#7AA2F7">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="x" values="176;176;120;120;120;176" keyTimes="0;0.68;0.7;0.85;0.86;1" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- laptop base -->
  <path d="M 75 262 L 375 262 L 360 285 L 90 285 Z" fill="url(#laptopBody)" stroke="#3b3f58" stroke-width="1.5"/>
  <rect x="205" y="264" width="40" height="4" rx="2" fill="#3b3f58"/>

  <!-- reflection glow under laptop -->
  <ellipse cx="225" cy="290" rx="140" ry="8" fill="#7AA2F7" opacity="0.12"/>

  <!-- gentle bob animation for whole laptop group -->
  <animateTransform xlink:href="#laptop-group" attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="3.5s" repeatCount="indefinite"/>

  <!-- tagline -->
  <text x="225" y="335" font-family="Fira Code, monospace" font-size="13" fill="#9AA5CE" text-anchor="middle">
    always shipping
    <tspan fill="#9ECE6A"> 🚀</tspan>
  </text>
</svg>
